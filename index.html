<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elusive button</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="main.js"></script>
</head>
<body>
    <div id="score">Clicks: 0</div>
    <div id="timer">Time: 10s</div>
    <button id="button"><p class="click"> Click Me </p> <p class="or">or try it</p></button>
    
    <div id="gameOverScreen" class="hidden">
      <div class="modal">
        <h2>Game Over</h2>
        <p id="finalScore"></p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>
    
</body>
</html>
